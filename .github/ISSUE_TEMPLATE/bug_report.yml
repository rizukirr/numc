name: Bug Report
description: Report a bug to help us improve numc
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How do we trigger this bug?
      placeholder: |
        1. Create an array with shape...
        2. Call function...
        3. Observe crash/error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU, Compiler, BLAS/BLIS version
