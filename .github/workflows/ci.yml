name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── LINT & FORMAT ──────────────────────────────────────────────────────────
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linting Tools
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21 clang-tidy

      - name: Check Formatting
        run: |
          find src include tests examples bench -type f \( -name '*.c' -o -name '*.h' \) -not -path '*/.venv/*' -not -path '*/vendor/*' | xargs clang-format-21 --dry-run --Werror

      - name: Static Analysis (Clang-Tidy)
        run: |
          sudo apt-get install -y cmake libomp-dev
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DNUMC_BUILD_TESTS=ON
          find src -name "*.c" | xargs clang-tidy -p build --warnings-as-errors='*'

  # ── BUILD & TEST ───────────────────────────────────────────────────────────
  build-and-test:
    needs: lint-and-format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: clang
          - compiler: gcc
          - compiler: clang
            asan: ON

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libomp-dev

    - name: Configure CMake
      env:
        COMPILER: ${{ matrix.compiler }}
        ASAN: ${{ matrix.asan || 'OFF' }}
      run: |
        BUILD_TYPE="Release"
        if [ "$ASAN" = "ON" ]; then
          BUILD_TYPE="Debug"
        fi
        cmake -S . -B build \
          -DCMAKE_C_COMPILER="$COMPILER" \
          -DNUMC_ENABLE_ASAN="$ASAN" \
          -DNUMC_BUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE"

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests
      env:
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt
      run: |
        cd build
        ctest --output-on-failure --parallel $(nproc)

  # ── CROSS-COMPILE & TEST (ARM/RISC-V) ────────────────────────────────────
  cross-compile:
    needs: lint-and-format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: neon
            toolchain: cmake/toolchain-aarch64.cmake
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgomp-dev-arm64-cross qemu-user-static
          - target: sve
            toolchain: cmake/toolchain-aarch64-sve.cmake
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgomp-dev-arm64-cross qemu-user-static
          - target: rvv
            toolchain: cmake/toolchain-riscv64.cmake
            packages: gcc-riscv64-linux-gnu g++-riscv64-linux-gnu libgomp-dev-riscv64-cross qemu-user-static

    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.packages }}

      - name: Configure & Build
        env:
          TOOLCHAIN: ${{ matrix.toolchain }}
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DNUMC_BUILD_TESTS=ON \
            -DNUMC_BUILD_EXAMPLES=OFF \
            -DNUMC_BUILD_BENCHMARKS=OFF
          cmake --build build --parallel $(nproc)

      - name: Run Tests via QEMU
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  # ── CODE COVERAGE ──────────────────────────────────────────────────────────
  coverage:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libomp-dev lcov

      - name: Configure & Build for Coverage
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DNUMC_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage"
          cmake --build build --parallel $(nproc)

      - name: Generate Coverage Report
        run: |
          cd build
          ctest --output-on-failure --parallel $(nproc)
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/external/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info
