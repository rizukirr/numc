name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── LINT & FORMAT ──────────────────────────────────────────────────────────
  # Fast feedback for contributors on code style
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linting Tools
        run: |
          # Install LLVM 21 to match development toolchain
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21 clang-tidy

      - name: Check Formatting
        run: |
          # Find all source files and check formatting (exclude .venv/vendor dirs)
          find src include tests examples bench -type f \( -name '*.c' -o -name '*.h' \) -not -path '*/.venv/*' -not -path '*/vendor/*' | xargs clang-format-21 --dry-run --Werror

      - name: Static Analysis (Clang-Tidy)
        run: |
          # Generate compilation database for clang-tidy
          sudo apt-get install -y cmake libomp-dev libblis-dev
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DNUMC_BUILD_TESTS=ON
          # Run clang-tidy on core sources
          find src -name "*.c" | xargs clang-tidy -p build --warnings-as-errors='*'

  # ── BUILD & TEST ───────────────────────────────────────────────────────────
  # Comprehensive matrix testing across compilers and configurations
  build-and-test:
    needs: lint-and-format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        blas: [ON, OFF]
        vendor_blis: [OFF]
        include:
          - compiler: clang
            blas: ON
            vendor_blis: ON  # Test the heavy vendored build
          - compiler: clang
            blas: OFF
            vendor_blis: OFF
            asan: ON         # Test with AddressSanitizer

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libomp-dev
        if [ "${{ matrix.vendor_blis }}" != "ON" ]; then
          sudo apt-get install -y libblis-dev
        fi

    - name: Cache vendored BLIS
      if: matrix.vendor_blis == 'ON'
      uses: actions/cache@v4
      with:
        path: build/external/blis
        key: blis-vendored-${{ runner.os }}-${{ hashFiles('external/blis/version', 'external/blis/config_registry') }}

    - name: Configure CMake
      env:
        CC: ${{ matrix.compiler }}
      run: |
        BUILD_TYPE="Release"
        if [ "${{ matrix.asan }}" = "ON" ]; then
          BUILD_TYPE="Debug"
        fi
        cmake -S . -B build \
          -DCMAKE_C_COMPILER=${{ matrix.compiler }} \
          -DNUMC_USE_BLAS=${{ matrix.blas }} \
          -DNUMC_VENDOR_BLIS=${{ matrix.vendor_blis }} \
          -DNUMC_ENABLE_ASAN=${{ matrix.asan || 'OFF' }} \
          -DNUMC_BUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE"

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests
      env:
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt
      run: |
        cd build
        ctest --output-on-failure --parallel $(nproc)

  # ── CROSS-COMPILE & TEST (ARM/RISC-V) ────────────────────────────────────
  # Verify NEON, SVE, and RVV GEMM kernels via QEMU user-mode emulation
  cross-compile:
    needs: lint-and-format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: neon
            toolchain: cmake/toolchain-aarch64.cmake
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static
          - target: sve
            toolchain: cmake/toolchain-aarch64-sve.cmake
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static
          - target: rvv
            toolchain: cmake/toolchain-riscv64.cmake
            packages: gcc-riscv64-linux-gnu g++-riscv64-linux-gnu qemu-user-static

    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.packages }}

      - name: Configure & Build
        env:
          TOOLCHAIN: ${{ matrix.toolchain }}
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DNUMC_USE_BLAS=OFF \
            -DNUMC_BUILD_TESTS=ON
          cmake --build build --parallel $(nproc)

      - name: Run Tests via QEMU
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  # ── CODE COVERAGE ──────────────────────────────────────────────────────────
  coverage:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libomp-dev libblis-dev lcov

      - name: Configure & Build for Coverage
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DNUMC_BUILD_TESTS=ON -DNUMC_USE_BLAS=ON \
            -DCMAKE_C_FLAGS="--coverage"
          cmake --build build --parallel $(nproc)

      - name: Generate Coverage Report
        run: |
          cd build
          ctest --output-on-failure --parallel $(nproc)
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/external/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      # You can integrate with Codecov here in the future
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: build/coverage.info
