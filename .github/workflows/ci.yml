name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [clang, gcc]
        blas: [ON, OFF]
        vendor_blis: [OFF]
        include:
          - compiler: clang
            blas: ON
            vendor_blis: ON
          - compiler: clang
            blas: OFF
            vendor_blis: OFF
            asan: ON

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      env:
        VENDOR_BLIS: ${{ matrix.vendor_blis }}
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libomp-dev
        if [ "$VENDOR_BLIS" != "ON" ]; then
          sudo apt-get install -y libblis-dev
        fi

    - name: Cache vendored BLIS
      if: matrix.vendor_blis == 'ON'
      uses: actions/cache@v4
      with:
        path: build/_deps/blis-*
        key: blis-vendored-${{ runner.os }}-${{ hashFiles('external/blis/version') }}

    - name: Configure CMake
      env:
        CC_COMPILER: ${{ matrix.compiler }}
        USE_BLAS: ${{ matrix.blas }}
        VENDOR_BLIS: ${{ matrix.vendor_blis }}
        ENABLE_ASAN: ${{ matrix.asan || 'OFF' }}
      run: |
        BUILD_TYPE="Release"
        ASAN_FLAG="OFF"
        if [ "${ENABLE_ASAN}" = "ON" ]; then
          BUILD_TYPE="Debug"
          ASAN_FLAG="ON"
        fi
        cmake -S . -B build \
          -DCMAKE_C_COMPILER="$CC_COMPILER" \
          -DNUMC_USE_BLAS="$USE_BLAS" \
          -DNUMC_VENDOR_BLIS="$VENDOR_BLIS" \
          -DNUMC_ENABLE_ASAN="$ASAN_FLAG" \
          -DNUMC_BUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE"

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests
      env:
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt
      run: |
        cd build
        ctest --output-on-failure
